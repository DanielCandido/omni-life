version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: omni-life-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-omnilife}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-omnilife123}
      POSTGRES_DB: ${POSTGRES_DB:-omnilife}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-omnilife}']
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: omni-life-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://${POSTGRES_USER:-omnilife}:${POSTGRES_PASSWORD:-omnilife123}@postgres:5432/${POSTGRES_DB:-omnilife}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-this-refresh-secret-in-production}
      JWT_EXPIRY: ${JWT_EXPIRY:-15m}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY:-7d}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:8081}
    ports:
      - '3000:3000'
    volumes:
      - ./apps/api/prisma:/app/apps/api/prisma

volumes:
  postgres_data:
    driver: local
